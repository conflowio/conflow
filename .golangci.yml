version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - gosec
    - govet
    - staticcheck
    - unparam
    - unused
  settings:
    gosec:
      excludes:
        - G204 # exec block runs user-configured commands by design
        - G306 # generated source files use 0644 intentionally
        - G404 # non-crypto random IDs in util/rand
        - G703 # codegen writes to user-specified module paths
      config:
        global:
          nosec: false
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
      settings:
        printf:
          funcs:
            - parsley.NewErrorf
            - function.NewErrorf
    staticcheck:
      checks:
        - all
        - -QF1003
        - -QF1004
        - -QF1006
        - -QF1008
        - -QF1009
        - -QF1012
        - -ST1001
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples/
      - pkg/.+/.*fakes/
      - pkg/test/
    rules:
      - path: pkg/conflow/block/container\.go
        linters:
          - gosec
      - path: pkg/conflow/generator/
        linters:
          - gosec
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples/
