version: 2.1

workflows:
  version: 2
  main:
    jobs:
      - test
      - release:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v[0-9]+(\.[0-9]+)*(-.*)*/

jobs:
  test:
    docker:
      - image: cimg/go:1.26.4
    working_directory: /home/circleci/project
    resource_class: large
    steps:
      - checkout
      - run: make check
      - run: make test
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  release:
    docker:
      - image: cimg/go:1.26.4
    resource_class: large
    steps:
      - checkout
      - run: go install github.com/goreleaser/goreleaser/v2@v2.16.0
      - run: goreleaser
